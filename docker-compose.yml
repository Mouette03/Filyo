# Image unique : frontend + backend dans le même conteneur
# Accès : http://localhost:3001 (ou PORT de votre choix)

services:
  filyo:
    image: ghcr.io/mouette03/filyo:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: filyo
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      TRUST_PROXY: ${TRUST_PROXY:-false}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${DATA_PATH:-./data}:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

