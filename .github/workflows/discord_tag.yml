name: 🚀 Notif Discord Release

on:
  release:
    types: [published]   # se déclenche à chaque nouvelle release/tag

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Envoyer notif Discord
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          embed-title: "🚀 Release ${{ github.event.release.tag_name }}"
          embed-description: ${{ github.event.release.body }}
          embed-url: ${{ github.event.release.html_url }}
          embed-color: 5814783
          username: "GitHub Release Bot"