name: 🚀 Notif Discord Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Nom du tag (ex: v1.2.3)"
        required: true
        type: string
      release_body:
        description: "Description de la release"
        required: false
        default: "Déclenchement manuel de la notification."
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Envoyer notif Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_TAG }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.event.release.tag_name }}
          BODY: ${{ github.event_name == 'workflow_dispatch' && inputs.release_body || github.event.release.body }}
          RELEASE_URL: ${{ github.event_name == 'workflow_dispatch' && format('{0}/{1}/releases/tag/{2}', github.server_url, github.repository, inputs.tag_name) || github.event.release.html_url }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          DESCRIPTION="${BODY}

🏷️ **Tag :** [\`${TAG}\`](${REPO_URL}/releases/tag/${TAG})
🐙 **Image Docker :** [Voir les versions du conteneur](https://github.com/Mouette03/Filyo/pkgs/container/filyo/versions)"

          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg tag "$TAG" \
              --arg desc "$DESCRIPTION" \
              --arg url "$RELEASE_URL" \
              '{
                username: "GitHub Release Bot",
                embeds: [{
                  title: ("🚀 Release " + $tag),
                  description: $desc,
                  url: $url,
                  color: 5814783,
                  footer: {
                    text: "Filyo • GitHub Release"
                  }
                }]
              }')"