name: 🚀 Notif Discord Release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Envoyer notif Discord
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_TAG }}
          embed-title: "🚀 Release ${{ github.event.release.tag_name }}"
          embed-description: |
            ${{ github.event.release.body }}

            🐙 **Image Docker :** [ghcr.io/mouette03/filyo](https://github.com/Mouette03/Filyo/pkgs/container/filyo)
          embed-url: ${{ github.event.release.html_url }}
          embed-color: 5814783
          username: "GitHub Release Bot"
