name: 🚀 Notif Discord Release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Envoyer notif Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_TAG }}
          TAG: ${{ github.event.release.tag_name }}
          BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg tag "$TAG" \
              --arg body "$BODY" \
              --arg url "$RELEASE_URL" \
              --arg repo "$REPO_URL" \
              '{
                username: "GitHub Release Bot",
                embeds: [{
                  title: ("🚀 Release " + $tag),
                  description: $body,
                  url: $url,
                  color: 5814783,
                  fields: [
                    {
                      name: "🏷️ Tag",
                      value: ("[`" + $tag + "`](" + $repo + "/releases/tag/" + $tag + ")"),
                      inline: true
                    },
                    {
                      name: "🐳 Image Docker",
                      value: "[Voir les versions du conteneur](https://github.com/Mouette03/Filyo/pkgs/container/filyo/versions)",
                      inline: true
                    }
                  ],
                  footer: {
                    text: "Filyo • GitHub Release"
                  }
                }]
              }')"