name: Zod Schema Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test-zod:
    name: Test Zod schemas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run Zod tests
        working-directory: backend
        run: npx tsx test/zod.test.ts
