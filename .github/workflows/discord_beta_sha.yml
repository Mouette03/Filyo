name: 🧪 Beta Release (changes from previous SHA)

on:
  workflow_dispatch:
    inputs:
      sha_tag:
        description: "SHA de l'image actuelle (ex: sha-9878b78)"
        required: true
        type: string
      previous_sha:
        description: "SHA de la beta précédente (ex: sha-abc1234) — laisser vide pour comparer depuis main"
        required: false
        type: string
      branch:
        description: "Branche à analyser (ex: develop)"
        required: true
        default: "develop"
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch }}

      - name: Fetch toutes les branches
        run: git fetch --all

      - name: Récupérer les commits depuis le SHA précédent
        id: commits
        env:
          PREV_INPUT: ${{ github.event.inputs.previous_sha }}
          BRANCH_INPUT: ${{ github.event.inputs.branch }}
        run: |
          PREV="$PREV_INPUT"

          if [ -z "$PREV" ]; then
            # Pas de SHA précédent → compare depuis main
            RAW=$(git log "origin/$BRANCH_INPUT" --not origin/main --pretty=format:"%s")
            BASE="main"
          else
            # Extrait le hash court depuis "sha-9878b78" → "9878b78"
            PREV_HASH=$(echo "$PREV" | sed 's/sha-//')
            RAW=$(git log "${PREV_HASH}..HEAD" --pretty=format:"%s")
            BASE="$PREV"
          fi

          if [ -z "$RAW" ]; then
            RAW="Aucun nouveau commit depuis \`${BASE}\`."
          fi

          echo "base=$BASE" >> $GITHUB_OUTPUT
          echo "=== COMMITS TROUVÉS ==="
          echo "$RAW"
          DELIM=$(openssl rand -hex 16)
          echo "raw<<$DELIM" >> $GITHUB_OUTPUT
          echo "$RAW" >> $GITHUB_OUTPUT
          echo "$DELIM" >> $GITHUB_OUTPUT

      - name: Résumer les commits avec l'IA
        id: summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMITS: ${{ steps.commits.outputs.raw }}
        run: |
          PROMPT="Voici une liste de commits git pour une release bêta. Fais un résumé clair et lisible en français, groupé par thème (nouveautés, corrections, etc.), avec des emojis. Maximum 10 lignes. Commits :\n${COMMITS}"
          BODY=$(jq -n --arg content "$PROMPT" '{"model":"gpt-4o-mini","messages":[{"role":"user","content":$content}],"max_tokens":400}')
          RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Résumé indisponible"')
          DELIM=$(openssl rand -hex 16)
          echo "summary<<$DELIM" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "$DELIM" >> $GITHUB_OUTPUT

      - name: Envoyer notif Discord
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_BETA }}
          embed-title: "🧪 Beta Release"
          embed-description: |
            **Image :** `ghcr.io/mouette03/filyo:${{ github.event.inputs.sha_tag }}`
            **Branche :** `${{ github.event.inputs.branch }}`
            **Déclenché par :** ${{ github.actor }}
            **Changements depuis `${{ steps.commits.outputs.base }}` :**

            ${{ steps.summary.outputs.summary }}
          embed-color: 16753920
          username: "GitHub Beta Bot"