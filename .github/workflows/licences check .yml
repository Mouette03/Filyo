name: License scan

on:
  push:
  workflow_dispatch:

jobs:
  license-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scan frontend
        working-directory: frontend
        run: |
          npm ci
          npx license-checker --production --json > licenses-frontend-production.json

      - name: Upload frontend licenses
        uses: actions/upload-artifact@v4
        with:
          name: licenses-frontend
          path: frontend/licenses-frontend-production.json

      - name: Scan backend
        working-directory: backend
        run: |
          npm ci
          npx license-checker --production --json > licenses-backend-production.json

      - name: Upload backend licenses
        uses: actions/upload-artifact@v4
        with:
          name: licenses-backend
          path: backend/licenses-backend-production.json
