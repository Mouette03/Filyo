name: Update licenses
on:
  push:
    branches:
      - '**'
    paths: 
      - '**/package.json'
      - '**/package-lock.json'
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  licenses:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}
        fetch-depth: 0

    - name: Ensure on a local branch
      run: git checkout -B "${{ github.ref_name }}"

    - uses: actions/setup-node@v4
      with: 
        node-version: 24
        
    - name: Backend licenses
      run: |
        cd backend
        npm install
        npx license-checker-rseidelsohn --summary --csv > licenses.csv
        
    - name: Frontend licenses
      run: |
        cd frontend
        npm install
        npx license-checker-rseidelsohn --summary --csv > licenses.csv
    
    - name: Commit & push licenses
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add backend/licenses.csv frontend/licenses.csv
        git diff --staged --quiet || git commit -m "Update licenses [skip ci]"
        git push origin "${{ github.ref_name }}"
