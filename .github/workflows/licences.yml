name: Update licenses
on:
  push:
    paths: ['**/package.json', '**/package-lock.json']
  pull_request:
    paths: ['**/package.json', '**/package-lock.json']
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

jobs:
  licenses:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with: { node-version: 24 }
    
    - name: Backend licenses
      run: |
        cd backend
        npm install
        npx license-checker-rseidelsohn --summary --csv > licenses.csv
        
    - name: Frontend licenses
      run: |
        cd frontend
        npm install
        npx license-checker-rseidelsohn --summary --csv > licenses.csv
    
    - name: Commit & push
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: Update licenses [skip ci]
        file_pattern: backend/licenses.csv frontend/licenses.csv
