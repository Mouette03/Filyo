name: Update licenses
on:
  workflow_dispatch:        # Bouton manuel
  schedule:
    - cron: '0 2 1 * *'     # 1er du mois
  push:
    paths: 
      - '**/package.json'
      - '**/package-lock.json'

permissions:
  contents: write           # ← PUSH AUTORISÉ !

jobs:
  licenses:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with: 
        node-version: 24
        
    - name: Backend licenses
      run: |
        cd backend
        npm install
        npx license-checker-rseidelsohn --summary --csv > licenses.csv
        
    - name: Frontend licenses
      run: |
        cd frontend
        npm install
        npx license-checker-rseidelsohn --summary --csv > licenses.csv
    
    - name: Commit & push licenses
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add backend/licenses.csv frontend/licenses.csv
        git diff --staged --quiet || git commit -m "Update licenses [skip ci]"
        git push
