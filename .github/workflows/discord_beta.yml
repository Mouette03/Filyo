name: 🧪 Beta Release (changes from main)

on:
  workflow_dispatch:
    inputs:
      sha_tag:
        description: "SHA de l'image (ex: sha-9878b78)"
        required: true
        type: string
      branch:
        description: "Branche à analyser (ex: main)"
        required: true
        default: "main"
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch }}

      - name: Récupérer les commits depuis le tag latest
        id: commits
        run: |
          LAST_TAG=$(git tag --sort=-creatordate | grep -E '^latest$' | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG=$(git tag --sort=-creatordate | grep -v -E 'beta|alpha|rc' | head -n 1)
          fi

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="début du projet"
            ALL=$(git log --oneline -20 --pretty=format:"- %s")
            APP=$(git log --oneline -20 --pretty=format:"- %s" -- ':!.github/' ':!*.yml' ':!*.yaml')
          else
            ALL=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s")
            APP=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" -- ':!.github/' ':!*.yml' ':!*.yaml')
          fi

          # Préférer les commits applicatifs, fallback sur tous si vide
          if [ -n "$APP" ]; then
            RAW="$APP"
          elif [ -n "$ALL" ]; then
            RAW="$ALL"
          else
            RAW=$(git log --oneline -20 --pretty=format:"- %s")
          fi

          echo "=== COMMITS TRANSMIS À L'IA ==="
          echo "$RAW"
          echo "================================"

          DELIMITER="DELIM_$(openssl rand -hex 8)"
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "raw<<${DELIMITER}" >> $GITHUB_OUTPUT
          echo "$RAW" >> $GITHUB_OUTPUT
          echo "${DELIMITER}" >> $GITHUB_OUTPUT

      - name: Résumer les commits avec l'IA
        id: summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMITS: ${{ steps.commits.outputs.raw }}
        run: |
          echo "$COMMITS" > /tmp/commits.txt

          PROMPT=$(printf 'Voici une liste de commits git pour une release bêta d'\''une application. Fais un résumé clair et lisible en français, groupé par thème (✨ Nouveautés, 🐛 Corrections, ⚡ Améliorations, etc.), avec des emojis. Concentre-toi sur les changements applicatifs (fonctionnalités, UI, API, base de données, etc.). Ignore ou mets en dernier les changements de CI/CD, workflows et configuration. Maximum 15 lignes.\n\nCommits :\n%s' "$(cat /tmp/commits.txt)")

          BODY=$(jq -n --arg content "$PROMPT" \
            '{"model":"gpt-4o-mini","messages":[{"role":"user","content":$content}],"max_tokens":600}')

          RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Résumé indisponible"')

          DELIMITER="DELIM_$(openssl rand -hex 8)"
          echo "summary<<${DELIMITER}" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "${DELIMITER}" >> $GITHUB_OUTPUT

      - name: Envoyer notif Discord
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_BETA }}
          embed-title: "🧪 Beta Release"
          embed-description: |
            **Image :** `ghcr.io/mouette03/filyo:${{ github.event.inputs.sha_tag }}`
            **Branche :** `${{ github.event.inputs.branch }}`
            **Déclenché par :** ${{ github.actor }}
            **Changements depuis `${{ steps.commits.outputs.last_tag }}` :**

            ${{ steps.summary.outputs.summary }}
          embed-color: 16753920
          username: "GitHub Beta Bot"