name: 🧪 Beta Release (changes from main)

on:
  workflow_dispatch:
    inputs:
      sha_tag:
        description: "SHA de l'image (ex: sha-9878b78)"
        required: true
        type: string
      branch:
        description: "Branche à analyser (ex: main)"
        required: true
        default: "main"
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch }}

      - name: Récupérer les commits depuis le tag latest
        id: commits
        run: |
          LAST_TAG=$(git tag --sort=-creatordate | grep -E '^latest$' | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG=$(git tag --sort=-creatordate | grep -v -E 'beta|alpha|rc' | head -n 1)
          fi

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="début du projet"
            RANGE="-20"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          # Construire un log enrichi : message + fichiers modifiés par commit
          RAW=""
          while IFS= read -r sha; do
            MSG=$(git log -1 --pretty=format:"%s" "$sha")
            FILES=$(git diff-tree --no-commit-id -r --name-only "$sha" | grep -v -E '\.github/|\.yml$|\.yaml$' | head -10 | tr '\n' ', ' | sed 's/,$//')
            if [ -n "$FILES" ]; then
              RAW="${RAW}- ${MSG} [fichiers: ${FILES}]\n"
            else
              RAW="${RAW}- ${MSG}\n"
            fi
          done < <(git log $RANGE --pretty=format:"%H" -- ':!.github/' ':!*.yml' ':!*.yaml' 2>/dev/null || git log --oneline -20 --pretty=format:"%H")

          # Fallback si vide
          if [ -z "$RAW" ]; then
            while IFS= read -r sha; do
              MSG=$(git log -1 --pretty=format:"%s" "$sha")
              FILES=$(git diff-tree --no-commit-id -r --name-only "$sha" | head -10 | tr '\n' ', ' | sed 's/,$//')
              RAW="${RAW}- ${MSG} [fichiers: ${FILES}]\n"
            done < <(git log --oneline -20 --pretty=format:"%H")
          fi

          echo "=== COMMITS TRANSMIS À L'IA ==="
          printf "%b\n" "$RAW"
          echo "================================"

          DELIMITER="DELIM_$(openssl rand -hex 8)"
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          printf "raw<<%s\n%b\n%s\n" "${DELIMITER}" "$RAW" "${DELIMITER}" >> $GITHUB_OUTPUT

      - name: Résumer les commits avec l'IA
        id: summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMITS: ${{ steps.commits.outputs.raw }}
        run: |
          printf "%s" "$COMMITS" > /tmp/commits.txt

          PROMPT=$(printf 'Tu es un assistant technique. Voici une liste de commits git avec les fichiers modifiés pour une release bêta de lapplication Filyo (application de partage de fichiers). Chaque ligne est au format "- message [fichiers: ...]".\n\nTa mission : faire un résumé CONCRET et PRÉCIS en français de ce qui a changé, groupé par thème avec des emojis :\n🆕 Nouveautés\n🐛 Corrections de bugs\n⚡ Améliorations\n\nRègles importantes :\n- Utilise les noms de fichiers pour déduire la fonctionnalité impactée (ex: SharePage.tsx = page de partage, DashboardPage.tsx = tableau de bord)\n- Sois spécifique : écris "Correction de la limite de téléchargement" pas "Résolution de divers bugs"\n- Si plusieurs commits touchent la même fonctionnalité, regroupe-les en une seule ligne\n- Maximum 15 lignes au total\n- NE PAS inventer ni généraliser, reste fidèle aux commits\n\nCommits :\n%s' "$(cat /tmp/commits.txt)")

          BODY=$(jq -n --arg content "$PROMPT" \
            '{"model":"gpt-4o-mini","messages":[{"role":"user","content":$content}],"max_tokens":700}')

          RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Résumé indisponible"')

          DELIMITER="DELIM_$(openssl rand -hex 8)"
          echo "summary<<${DELIMITER}" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "${DELIMITER}" >> $GITHUB_OUTPUT

      - name: Envoyer notif Discord
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_BETA }}
          embed-title: "🧪 Beta Release"
          embed-description: |
            **Image :** `ghcr.io/mouette03/filyo:${{ github.event.inputs.sha_tag }}`
            **Branche :** `${{ github.event.inputs.branch }}`
            **Déclenché par :** ${{ github.actor }}
            **Changements depuis `${{ steps.commits.outputs.last_tag }}` :**

            ${{ steps.summary.outputs.summary }}
          embed-color: 16753920
          username: "GitHub Beta Bot"