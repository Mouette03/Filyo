name: 🧪 Beta Release (changes from main)

on:
  workflow_dispatch:
    inputs:
      sha_tag:
        description: "SHA de l'image (ex: sha-9878b78)"
        required: true
        type: string
      branch:
        description: "Branche à analyser (ex: develop)"
        required: true
        default: "develop"
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch }}

      - name: Fetch toutes les branches
        run: git fetch --all

      - name: Récupérer les commits depuis main
        id: commits
        run: |
          RAW=$(git log origin/${{ github.event.inputs.branch }} --not origin/main --pretty=format:"%s")
          if [ -z "$RAW" ]; then
            RAW="Aucun commit spécifique à cette branche."
          fi
          echo "=== COMMITS TROUVÉS ==="
          echo "$RAW"
          echo "raw<<EOF" >> $GITHUB_OUTPUT
          echo "$RAW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Résumer les commits avec l'IA
        id: summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMITS="${{ steps.commits.outputs.raw }}"
          RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [{
                \"role\": \"user\",
                \"content\": $(echo "Voici une liste de commits git pour une release bêta. Fais un résumé clair et lisible en français, groupé par thème (nouveautés, corrections, etc.), avec des emojis. Maximum 10 lignes. Commits : $COMMITS" | jq -Rs .)
              }],
              \"max_tokens\": 400
            }")
          echo "=== RÉPONSE API ==="
          echo "$RESPONSE"
          SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Résumé indisponible"')
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Envoyer notif Discord
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_BETA }}
          embed-title: "🧪 Beta Release"
          embed-description: |
            **Image :** `ghcr.io/mouette03/filyo:${{ github.event.inputs.sha_tag }}`
            **Branche :** `${{ github.event.inputs.branch }}`
            **Déclenché par :** ${{ github.actor }}
            **Changements depuis latest :**

            ${{ steps.summary.outputs.summary }}
          embed-color: 16753920
          username: "GitHub Beta Bot"
