name: CI — Backend

on:
  push:
    branches: ['**']
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'

jobs:
  install:
    name: 📦 Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install
        working-directory: backend
        run: npm install

      - name: Check for unresolved peer deps
        working-directory: backend
        run: npm ls --depth=0 2>&1 | grep -i 'WARN\|ERR' || true

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: node-modules-${{ hashFiles('backend/package.json') }}

  typecheck:
    name: 🔷 TypeScript typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: node-modules-${{ hashFiles('backend/package.json') }}

      - name: Install (if cache miss)
        working-directory: backend
        run: npm install

      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate

      - name: TypeScript check
        working-directory: backend
        run: npx tsc --noEmit

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: node-modules-${{ hashFiles('backend/package.json') }}

      - name: Install (if cache miss)
        working-directory: backend
        run: npm install

      - name: Build
        working-directory: backend
        run: npm run build

  zod-tests:
    name: 🧪 Zod schema tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: node-modules-${{ hashFiles('backend/package.json') }}

      - name: Install (if cache miss)
        working-directory: backend
        run: npm install

      - name: Run Zod tests
        working-directory: backend
        run: npx tsx test/zod.test.ts
