<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5c6bfa"/>
      <stop offset="100%" stop-color="#3b4de8"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>
  <!-- Flèche haut (gauche) -->
  <line x1="11" y1="22" x2="11" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <polyline points="7,14 11,10 15,14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Flèche bas (droite) -->
  <line x1="21" y1="10" x2="21" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <polyline points="17,18 21,22 25,18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>